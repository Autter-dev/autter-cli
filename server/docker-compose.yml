services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: autter
      POSTGRES_PASSWORD: autter
      POSTGRES_DB: autter
    ports:
      - "5432:5432"
    volumes:
      - autter_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autter -d autter"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  autter_pgdata:
